<meta name="apple-mobile-web-app-title" content="Budget">
<title>Family Budget v5.5</title>
<style>
:root{
  --bg:#eef1f6;
  --card:#ffffff;
  --ink:#0f172a;
  --ink2:#64748b;
  --ink3:#94a3b8;
  --line:#e8edf3;
  --line2:#dfe5ee;
  --blue:#2563eb;
  --blue2:#1d4ed8;
  --green:#047857;
  --green2:#10b981;
  --green-bg:#ecfdf5;
  --red:#dc2626;
  --red2:#ef4444;
  --red-bg:#fef2f2;
  --amber:#b45309;
  --amber2:#d97706;
  --amber-bg:#fffbeb;
  --hero-1:#1e293b;
  --hero-2:#0f172a;
  --hero-3:#312e81;
  --r:14px;
  --r-sm:10px;
  --r-lg:20px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --sh-sm:0 1px 2px rgba(15,23,42,.05);
  --sh:0 2px 8px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --sh-md:0 8px 24px -6px rgba(15,23,42,.12),0 2px 6px -2px rgba(15,23,42,.06);
  --sh-lg:0 20px 48px -12px rgba(15,23,42,.28);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior-y:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-bottom:calc(78px + var(--safe-b));-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}

/* ============ TOP BAR ============ */
.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(160deg,var(--hero-2) 0%,var(--hero-1) 55%,var(--hero-3) 140%);color:#fff;padding:calc(10px + var(--safe-t)) 16px 14px;box-shadow:0 4px 20px -6px rgba(15,23,42,.4)}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.topbar-title{font-size:1.15rem;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:7px}
.topbar-title .logo-dot{width:9px;height:9px;border-radius:50%;background:#fbbf24;box-shadow:0 0 0 3px rgba(251,191,36,.2)}
.topbar-version{font-size:.58rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.5px;background:rgba(255,255,255,.1);padding:2px 6px;border-radius:5px;margin-left:2px}
.topbar-actions{display:flex;gap:6px}
.topbar-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;backdrop-filter:blur(8px)}
.topbar-btn:active{background:rgba(255,255,255,.3);transform:scale(.92)}
.topbar-btn.active{background:#fff;color:var(--hero-1)}

/* Month nav */
.month-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.month-arrow{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:12px;transition:all .18s;flex-shrink:0}
.month-arrow:active{background:rgba(255,255,255,.25);transform:scale(.92)}
.month-name-wrap{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 16px;border-radius:12px;cursor:pointer;flex:1;transition:background .15s}
.month-name-wrap:active{background:rgba(255,255,255,.08)}
.month-name{font-size:1.18rem;font-weight:700;letter-spacing:-.3px;line-height:1.1}
.month-sub{font-size:.62rem;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;display:flex;align-items:center;gap:4px}
.month-caret{opacity:.5}
.month-picker-input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0;font-size:16px;color:transparent;background:transparent}
.month-picker-input::-webkit-calendar-picker-indicator{opacity:0;display:block;width:100%;height:100%;position:absolute;inset:0}
.month-today-pill{display:inline-flex;align-items:center;gap:4px;margin-top:5px;padding:3px 10px;font-size:.62rem;font-weight:700;border:1px solid rgba(251,191,36,.4);background:rgba(251,191,36,.15);color:#fde68a;border-radius:20px;cursor:pointer;letter-spacing:.3px}
.month-today-pill:active{background:rgba(251,191,36,.3)}

/* Search */
.search-row{padding:0 16px 12px;background:linear-gradient(160deg,var(--hero-1),var(--hero-3) 200%)}
.search-input{width:100%;padding:11px 14px;font-size:.92rem;border:none;border-radius:12px;background:rgba(255,255,255,.14);color:#fff;font-family:inherit;backdrop-filter:blur(8px)}
.search-input::placeholder{color:rgba(255,255,255,.55)}
.search-input:focus{outline:none;background:rgba(255,255,255,.22)}

/* ============ CONTENT ============ */
.content{padding:16px 14px 24px}

/* ============ HERO BALANCE CARD ============ */
.hero{background:linear-gradient(150deg,var(--hero-2),var(--hero-1) 60%,var(--hero-3) 150%);border-radius:var(--r-lg);padding:20px 20px 18px;color:#fff;box-shadow:var(--sh-md);position:relative;overflow:hidden;margin-bottom:14px}
.hero::after{content:'';position:absolute;top:-40%;right:-10%;width:200px;height:200px;background:radial-gradient(circle,rgba(99,102,241,.35),transparent 70%);pointer-events:none}
.hero-label{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;position:relative}
.hero-balance{font-size:2.5rem;font-weight:800;letter-spacing:-1.2px;line-height:1;margin-bottom:3px;position:relative}
.hero-balance.neg{color:#fca5a5}
.hero-sub{font-size:.72rem;color:rgba(255,255,255,.5);font-weight:500;margin-bottom:16px;position:relative;display:flex;align-items:center;gap:6px}
.hero-start-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4)}
.hero-stats{display:flex;gap:10px;position:relative}
.hero-stat{flex:1;background:rgba(255,255,255,.08);border-radius:12px;padding:11px 13px;backdrop-filter:blur(8px)}
.hero-stat-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.hero-stat.inc .hero-stat-label{color:#6ee7b7}
.hero-stat.exp .hero-stat-label{color:#fca5a5}
.hero-stat-val{font-size:1.02rem;font-weight:700;letter-spacing:-.3px}
.hero-stat-arrow{font-size:.6rem}

/* Confirmed progress */
.hero-progress{margin-top:14px;position:relative}
.hero-progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.hero-progress-label{font-size:.64rem;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.7px}
.hero-progress-val{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.85)}
.hero-progress-track{height:7px;background:rgba(255,255,255,.13);border-radius:5px;overflow:hidden}

/* ============ STARTING BALANCE ============ */

.start-status.manual{color:var(--amber);background:#fef3c7}

.link-btn{background:var(--blue);color:#fff;border:none;font-size:.7rem;font-weight:700;padding:7px 11px;border-radius:9px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;box-shadow:0 2px 6px rgba(37,99,235,.3)}

.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ============ TRANSACTION CARDS ============ */
.txn-list{display:flex;flex-direction:column;gap:8px}

.txn-card.balwarn-orange{background:linear-gradient(to right,#ffffff 0%,#ffffff 40%,#fed7aa 100%);border-color:#fdba74}
.txn-card.balwarn-red{background:linear-gradient(to right,#ffffff 0%,#ffffff 35%,#fecaca 100%);border-color:#fca5a5}
.txn-card.balwarn-orange::before{background:#ea580c}
.txn-card.balwarn-red::before{background:var(--red2)}
.txn-card:active{transform:scale(.985)}

.txn-amt{font-size:1rem;font-weight:800;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:2px;letter-spacing:-.3px}

.txn-meta{display:flex;align-items:center;gap:7px;margin-top:3px}

.bulk-bar{position:fixed;bottom:calc(74px + var(--safe-b));left:12px;right:12px;background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:35;box-shadow:var(--sh-lg);border-radius:var(--r);animation:slideUp .25s cubic-bezier(.16,1,.3,1)}

/* ============ SHEETS ============ */
.sheet-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;backdrop-filter:blur(2px)}
.sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:94vh;overflow:auto;padding-bottom:var(--safe-b);animation:sheetUp .32s cubic-bezier(.16,1,.3,1);-webkit-overflow-scrolling:touch}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 16px}

.sheet-close{border:none;background:var(--bg);color:var(--ink2);padding:7px;cursor:pointer;border-radius:10px;display:flex}
.sheet-close:active{background:var(--line2)}
.sheet-body{padding:0 20px 20px}

/* Form */
.fg{margin-bottom:15px}
.fg-label{display:block;font-size:.72rem;font-weight:700;color:var(--ink2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg-input,.fg-select,.fg-textarea{width:100%;padding:12px 14px;font-size:1rem;border:1.5px solid var(--line2);border-radius:12px;font-family:inherit;background:var(--card);color:var(--ink);transition:border-color .15s,box-shadow .15s}
.fg-input:focus,.fg-select:focus,.fg-textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.fg-textarea{resize:vertical;min-height:62px}
.fg-row{display:flex;gap:11px}
.fg-row .fg{flex:1}

/* Sign toggle - big & bulletproof */
.sign-toggle{display:flex;gap:10px;margin-bottom:10px}
.sign-btn{flex:1;padding:14px;font-size:.92rem;font-weight:800;border:2px solid var(--line2);border-radius:13px;background:var(--card);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;letter-spacing:.2px}
.sign-btn:active{transform:scale(.96)}
.sign-btn.active.expense{background:var(--red-bg);border-color:var(--red2);color:var(--red);box-shadow:0 2px 8px rgba(239,68,68,.18)}
.sign-btn.active.income{background:var(--green-bg);border-color:var(--green2);color:var(--green);box-shadow:0 2px 8px rgba(16,185,129,.18)}
.amt-input-wrap{position:relative}
.amt-input-prefix{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--ink2);font-size:1.15rem;font-weight:700;pointer-events:none}
.amt-input-wrap .fg-input{padding-left:30px;font-weight:800;font-size:1.3rem}

/* Recurring */
.recur-panel{padding:14px;background:var(--bg);border-radius:13px;border:1px solid var(--line);margin-top:8px}
.recur-default-note{font-size:.85rem;color:var(--ink2);padding:8px 0 2px;line-height:1.5}
.recur-default-note strong{color:var(--ink);font-weight:700}
.recur-adv-toggle{margin-top:12px;background:none;border:none;color:var(--blue);font-size:.82rem;font-weight:700;cursor:pointer;padding:6px 0;font-family:inherit}
.recur-toggle{display:flex;align-items:center;gap:10px}
.recur-toggle label{font-size:.9rem;font-weight:700;color:var(--ink);flex:1}
.recur-switch{position:relative;width:48px;height:28px;background:var(--line2);border-radius:14px;cursor:pointer;transition:background .2s;flex-shrink:0}
.recur-switch.on{background:var(--blue)}
.recur-switch::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:50%;transition:left .22s cubic-bezier(.16,1,.3,1);box-shadow:0 2px 5px rgba(0,0,0,.2)}
.recur-switch.on::after{left:22px}
.recur-warn{font-size:.74rem;color:var(--amber);margin-top:10px;background:var(--amber-bg);padding:9px 11px;border-radius:9px;border:1px solid #fde68a;line-height:1.4}

/* Buttons */
.btn-full{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:15px;font-size:1rem;font-weight:800;border-radius:14px;border:none;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.btn-full:active{transform:scale(.98)}
.btn-full.primary{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.35)}
.btn-full.secondary{background:var(--bg);color:var(--ink2);border:1.5px solid var(--line2)}
.btn-full.danger{background:var(--red-bg);color:var(--red);border:1.5px solid #fecaca}

/* Confirm sheet */
.conf-card{text-align:center;padding:8px 0 4px}
.conf-desc{font-size:1rem;color:var(--ink2);font-weight:600;margin-bottom:8px}
.conf-amount{font-size:2.4rem;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.conf-q{font-size:.92rem;color:var(--ink2);margin-bottom:18px;font-weight:500}
.conf-edit-input{width:100%;padding:15px;font-size:1.5rem;font-weight:800;border:2px solid var(--line2);border-radius:13px;text-align:center;font-family:inherit;margin-bottom:14px}
.conf-edit-input:focus{outline:none;border-color:var(--blue)}

/* Pull list */
.pull-item{display:flex;align-items:center;gap:11px;padding:13px 4px;border-bottom:1px solid var(--line)}
.pull-item:last-child{border-bottom:none}
.pull-cb{width:22px;height:22px;accent-color:var(--blue);flex-shrink:0}
.pull-desc{flex:1;font-size:.9rem;font-weight:600;color:var(--ink)}
.pull-amt{font-size:.86rem;font-weight:700}
.pull-info{text-align:center;padding:11px;background:var(--bg);border-radius:11px;margin-bottom:13px;font-size:.84rem;color:var(--ink2);font-weight:600}
.pull-info strong{color:var(--blue)}

/* Menu */
.set-section-title{font-size:.72rem;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.7px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.set-section-title:first-child{margin-top:0}
.set-item{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.set-item-name{flex:1;font-size:.9rem;font-weight:600;color:var(--ink)}
.set-item-count{font-size:.72rem;color:var(--ink3);font-weight:600;background:var(--bg);padding:2px 8px;border-radius:8px}
.set-item-btn{background:none;border:none;color:var(--ink3);padding:7px;cursor:pointer;border-radius:8px;display:flex}
.set-item-btn:active{background:var(--bg)}
.set-item-btn.del{color:var(--red2)}
.set-color-dot{width:24px;height:24px;border-radius:8px;flex-shrink:0;cursor:pointer;border:1px solid rgba(0,0,0,.08)}
.set-color-inp{width:44px;height:44px;border:1.5px solid var(--line2);border-radius:12px;cursor:pointer;padding:3px;background:var(--card)}
.set-note{font-size:.74rem;color:var(--ink3);margin-top:10px;line-height:1.5}
.menu-item{display:flex;align-items:center;gap:14px;padding:15px 4px;border-bottom:1px solid var(--line);font-size:.95rem;font-weight:600;color:var(--ink);cursor:pointer}
.menu-item:last-child{border-bottom:none}
.menu-item:active{opacity:.6}
.menu-item.danger{color:var(--red)}
.menu-item.toggle-item{justify-content:space-between}
.menu-icon{width:22px;height:22px;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.menu-item.danger .menu-icon{color:var(--red)}

/* Choice (series) */
.choice-btn{padding:15px;text-align:left;background:var(--card);border:1.5px solid var(--line2);border-radius:13px;cursor:pointer;margin-bottom:9px;width:100%;display:block}
.choice-btn:active{background:var(--bg)}
.choice-btn-title{font-size:.95rem;font-weight:700;color:var(--ink)}
.choice-btn-sub{font-size:.78rem;color:var(--ink2);margin-top:2px}

/* Toast */
.toast{position:fixed;bottom:calc(90px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:13px;font-size:.9rem;font-weight:700;z-index:100;box-shadow:var(--sh-lg);animation:toastIn .3s cubic-bezier(.16,1,.3,1),toastOut .3s 2.1s forwards;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* Print */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

}

<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SK='familyBudgetV1';
const DEF_CATS=[
  {name:'Income',color:'#059669'},{name:'Loan',color:'#B91C1C'},{name:'Utilities',color:'#0891B2'},
  {name:'Home',color:'#92400E'},{name:'Entertainment',color:'#7C3AED'},{name:'Insurance',color:'#4F46E5'},
  {name:'Memberships',color:'#DB2777'},{name:'Subscription',color:'#CA8A04'},{name:'Recreation',color:'#0D9488'},
  {name:'Transfer',color:'#64748B'},{name:'Education',color:'#1D4ED8'},{name:'Medical',color:'#DC2626'},
  {name:'Personal',color:'#78350F'},{name:'Credit Card',color:'#9333EA'},{name:'Holiday',color:'#BE185D'},
];
const TYPES=['ACH','EFT','Debit','Credit','Check','Venmo','ATM','Other'];
const FREQS=['Monthly','Bi-Weekly','Weekly','Annual','Quarterly','One-Time','Periodic'];

// v5.5: settings normalization — fills defaults & migrates older data
function normalizeSettings(){
  if(!D.settings)D.settings={};
  const s=D.settings;
  if(s.hideConfirmed===undefined)s.hideConfirmed=false;
  if(!Array.isArray(s.types)||!s.types.length)s.types=[...TYPES];
  if(!Array.isArray(s.frequencies)||!s.frequencies.length)s.frequencies=[...FREQS];
  if(typeof s.warnOrange!=='number'||isNaN(s.warnOrange))s.warnOrange=1000;
  if(typeof s.warnRed!=='number'||isNaN(s.warnRed))s.warnRed=500;
}
const RECUR_OPTS=['Monthly','Bi-Weekly','Weekly','Annual','Quarterly'];

function gid(){return 'i'+Date.now()+'_'+Math.random().toString(36).substr(2,8)}
function esc(t){const d=document.createElement('div');d.textContent=t==null?'':String(t);return d.innerHTML}
function fmt(n){if(n==null)return'\u2014';const a=Math.abs(n),s=a.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?'-$'+s:n>0?'+$'+s:'$'+s}
function fmtBal(n){if(n==null)return'\u2014';const a=Math.abs(n),s=a.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?'-$'+s:'$'+s}
function amtCls(n){return n>0?'pos':n<0?'neg':'zero'}
function eff(t){return(t.confirmed&&t.actual!==null&&t.actual!==undefined)?t.actual:t.projected}
function delta(t){if(!t.confirmed)return t.projected;if(t.actual===null||t.actual===undefined)return 0;return t.projected-t.actual}
function catCol(n){const c=D.categories.find(c=>c.name===n);return c?c.color:'#94a3b8'}
function pk(k){const[y,m]=k.split('.');return{year:+y,month:+m}}
function ml(k){const{year,month}=pk(k);return MONTHS[month-1]+' '+year}
function mk(y,m){return y+'.'+String(m).padStart(2,'0')}
function pm(k){let{year,month}=pk(k);month--;if(month<1){month=12;year--}return mk(year,month)}
function nm(k){let{year,month}=pk(k);month++;if(month>12){month=1;year++}return mk(year,month)}
function dow(monthKey,day){const{year,month}=pk(monthKey);const d=new Date(year,month-1,Math.min(day,daysInMonth(monthKey)));return DOW[d.getDay()]}
function daysInMonth(monthKey){const{year,month}=pk(monthKey);return new Date(year,month,0).getDate()}
function fmtTs(iso){if(!iso)return'Never';const d=new Date(iso),now=new Date(),diff=now-d,mins=Math.floor(diff/60000);if(mins<1)return'Just now';if(mins<60)return mins+'m ago';const hrs=Math.floor(mins/60);if(hrs<24)return hrs+'h ago';const days=Math.floor(hrs/24);if(days<7)return days+'d ago';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function bkCls(iso){if(!iso)return'ts-old';const d=Date.now()-new Date(iso).getTime();return d<86400000?'ts-fresh':d<259200000?'ts-stale':'ts-old'}

function load(){
  const s=localStorage.getItem(SK);
  if(s){
    try{D=JSON.parse(s)}catch(e){D={categories:[...DEF_CATS],months:{},lastUpdated:null,lastBackup:null,settings:{hideConfirmed:false}}}
    normalizeSettings();
    Object.values(D.months).forEach(m=>{
      if(m.isLinked===undefined)m.isLinked=false;
      m.transactions.forEach((t,i)=>{
        if(t.order===undefined)t.order=i;
        if(t.seriesId===undefined)t.seriesId=null;
      });
    });
  }else{
    D={categories:[...DEF_CATS],months:{},lastUpdated:new Date().toISOString(),lastBackup:null,settings:{hideConfirmed:false}};
    normalizeSettings();
    save();
  }
  // v4.2: Default to today's calendar month, creating it as linked if missing.
  // Fixes bug where adding a "Never" recurring transaction created 5 years of months
  // and the app would default to the latest (e.g. April 2031).
  const today=new Date();
  const todayKey=mk(today.getFullYear(),today.getMonth()+1);
  ensure(todayKey);
  cur=todayKey;
}
function save(){D.lastUpdated=new Date().toISOString();localStorage.setItem(SK,JSON.stringify(D))}
function ensure(k){if(!D.months[k])D.months[k]={startingBalance:0,transactions:[],isLinked:true}}
function getM(){ensure(cur);return D.months[cur]}
function allKeys(){return Object.keys(D.months).sort()}
function sortTxns(t){return[...t].sort((a,b)=>a.day-b.day||(a.order||0)-(b.order||0))}
function balances(txns,start){let b=start;return txns.map(t=>{b+=delta(t);return Object.assign({},t,{_bal:b})})}
function endBal(m,s){let b=s;m.transactions.forEach(t=>{b+=delta(t)});return b}

function getEffectiveStart(monthKey,seen){
  seen=seen||new Set();
  if(seen.has(monthKey))return 0;
  seen.add(monthKey);
  const m=D.months[monthKey];if(!m)return 0;
  if(m.isLinked){
    const prev=pm(monthKey);
    if(D.months[prev]){
      const prevStart=getEffectiveStart(prev,seen);
      return endBal(D.months[prev],prevStart);
    }
  }
  return m.startingBalance;
}
function summary(){
  const m=getM();const s=getEffectiveStart(cur);
  let inc=0,exp=0;
  m.transactions.forEach(t=>{const v=eff(t);if(v>0)inc+=v;else exp+=v});
  return{start:s,income:inc,expenses:exp,ending:endBal(m,s),confirmed:m.transactions.filter(t=>t.confirmed).length,total:m.transactions.length};
}
function hasPrevMonth(){return D.months[pm(cur)]!==undefined}

function generateRecurringDates(startMonthKey,startDay,opts){
  const out=[];
  const freq=opts.freq;
  const HARD_MAX=opts.endType==='never'?60:200;
  let maxOccur=HARD_MAX;
  if(opts.endType==='count')maxOccur=Math.min(opts.endCount,HARD_MAX);
  const endDateStr=opts.endType==='date'?opts.endDate:null;
  // 'eoy' (default): run through December of the start year.
  // 'months': run for N months from the start (inclusive).
  let endMonthKey=null;
  if(opts.endType==='eoy'){const{year}=pk(startMonthKey);endMonthKey=mk(year,12)}
  if(opts.endType==='months'){
    const n=Math.max(1,Math.min(parseInt(opts.endMonths)||1,HARD_MAX));
    let{year,month}=pk(startMonthKey);month+=n-1;while(month>12){month-=12;year++}endMonthKey=mk(year,month);
  }

  if(freq==='Monthly'||freq==='Quarterly'||freq==='Annual'){
    const stepMonths=freq==='Monthly'?1:freq==='Quarterly'?3:12;
    let mk2=startMonthKey;
    for(let i=0;i<maxOccur;i++){
      const dim=daysInMonth(mk2);const day=Math.min(startDay,dim);
      if(endDateStr){
        const{year,month}=pk(mk2);const dateStr=year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
        if(dateStr>endDateStr)break;
      }
      if(endMonthKey&&mk2>endMonthKey)break;
      out.push({monthKey:mk2,day});
      let{year,month}=pk(mk2);month+=stepMonths;while(month>12){month-=12;year++}mk2=mk(year,month);
    }
  } else if(freq==='Weekly'||freq==='Bi-Weekly'){
    const stepDays=freq==='Weekly'?7:14;
    const{year,month}=pk(startMonthKey);
    let cursor=new Date(year,month-1,Math.min(startDay,daysInMonth(startMonthKey)));
    for(let i=0;i<maxOccur;i++){
      if(endDateStr){
        const cd=cursor.toISOString().split('T')[0];if(cd>endDateStr)break;
      }
      const ck=mk(cursor.getFullYear(),cursor.getMonth()+1);
      if(endMonthKey&&ck>endMonthKey)break;
      out.push({monthKey:ck,day:cursor.getDate()});
      cursor=new Date(cursor.getTime()+stepDays*86400000);
    }
  }
  return out;
}

function addTxn(d,recurOpts){
  const placeNew=(month,data,seriesId)=>{
    const same=month.transactions.filter(t=>t.day===data.day);
    const mx=same.length?Math.max.apply(null,same.map(t=>t.order||0)):(-1);
    month.transactions.push(Object.assign({id:gid()},data,{order:mx+1,seriesId:seriesId,confirmed:false,actual:null}));
  };
  if(!recurOpts||!recurOpts.enabled){
    placeNew(getM(),d,null);
    save();sheet=null;render();toast('Added');
    return;
  }
  const seriesId='ser_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
  const instances=generateRecurringDates(cur,d.day,recurOpts);
  if(instances.length===0){alert('No occurrences generated. Check end date.');return}
  instances.forEach(inst=>{
    ensure(inst.monthKey);
    if(inst.monthKey!==cur&&D.months[inst.monthKey].transactions.length===0&&D.months[inst.monthKey].isLinked!==false){
      D.months[inst.monthKey].isLinked=true;
    }
    placeNew(D.months[inst.monthKey],Object.assign({},d,{day:inst.day}),seriesId);
  });
  save();sheet=null;render();
  toast('Added '+instances.length+' occurrences');
}

function deleteSeriesFromHere(id){
  const t=getM().transactions.find(t=>t.id===id);if(!t||!t.seriesId)return;
  const sid=t.seriesId;const startKey=cur;const startDay=t.day;let count=0;
  Object.keys(D.months).forEach(mkk=>{
    if(mkk<startKey)return;
    const month=D.months[mkk];
    month.transactions=month.transactions.filter(x=>{
      if(x.seriesId!==sid)return true;
      if(mkk===startKey&&x.day<startDay)return true;
      count++;return false;
    });
  });
  save();sheet=null;editId=null;render();toast('Deleted '+count+' occurrences');
}
function deleteSeriesAll(seriesId){
  let count=0;
  Object.values(D.months).forEach(m=>{
    const before=m.transactions.length;
    m.transactions=m.transactions.filter(t=>t.seriesId!==seriesId);
    count+=before-m.transactions.length;
  });
  save();sheet=null;editId=null;render();toast('Deleted '+count+' occurrences');
}
function updateSeriesFromHere(id,updates){
  const t=getM().transactions.find(t=>t.id===id);if(!t||!t.seriesId)return;
  const sid=t.seriesId;const startKey=cur;const startDay=t.day;let count=0;
  Object.keys(D.months).forEach(mkk=>{
    if(mkk<startKey)return;
    D.months[mkk].transactions.forEach(x=>{
      if(x.seriesId!==sid)return;
      if(mkk===startKey&&x.day<startDay)return;
      Object.entries(updates).forEach(function(kv){const k=kv[0],v=kv[1];if(k!=='confirmed'&&k!=='actual'&&k!=='id')x[k]=v});
      count++;
    });
  });
  save();sheet=null;editId=null;render();toast('Updated '+count+' occurrences');
}

  const same=m.transactions.filter(x=>x.day===t.day);

function moveUp(id){const m=getM(),t=m.transactions.find(x=>x.id===id);if(!t)return;const sorted=sortTxns(m.transactions),idx=sorted.findIndex(x=>x.id===id);if(idx<=0||sorted[idx-1].day!==t.day)return;const prev=sorted[idx-1],tmp=t.order;t.order=prev.order;prev.order=tmp;save();render()}

function getDisplayTxns(){
  const m=getM();
  return sortTxns(m.transactions.filter(t=>{
    const v=eff(t);
    if(filter==='pending'&&t.confirmed)return false;
    if(filter==='confirmed'&&!t.confirmed)return false;
    if(filter==='income'&&v<=0)return false;
    if(filter==='expenses'&&v>=0)return false;
    if(searchQ){const q=searchQ.toLowerCase();return t.description.toLowerCase().includes(q)||(t.company||'').toLowerCase().includes(q)||t.category.toLowerCase().includes(q)||(t.note||'').toLowerCase().includes(q)}
    return true;
  }));
}

function render(){
  const m=getM(),s=summary();
  const allTxns=sortTxns(m.transactions);
  const withBal=balances(allTxns,s.start);
  const balMap={};withBal.forEach(t=>{balMap[t.id]=t._bal});
  const displayTxns=getDisplayTxns();
  const isLinked=m.isLinked&&hasPrevMonth();
  const startManual=!m.isLinked&&hasPrevMonth();
  const hideConfirmed=D.settings.hideConfirmed;
  let h='';

  // Top bar
  h+='<div class="topbar"><div class="topbar-row"><div class="topbar-title"><span class="logo-dot"></span>Family Budget<span class="topbar-version">v5.5</span></div><div class="topbar-actions">';
  h+='<button class="topbar-btn '+(searchOpen?'active':'')+'" onclick="searchOpen=!searchOpen;if(!searchOpen)searchQ=\'\';render()">'+IC.search+'</button>';
  h+='<button class="topbar-btn '+(selMode?'active':'')+'" onclick="selMode=!selMode;selected.clear();render()">'+IC.sel+'</button>';
  h+='<button class="topbar-btn" onclick="sheet=\'menu\';render()">'+IC.menu+'</button>';
  // v4.2: Month picker + today button
  const monthPickerVal=cur.replace('.','-');
  const today=new Date();
  const todayKey=mk(today.getFullYear(),today.getMonth()+1);
  const onToday=cur===todayKey;
  h+='</div></div><div class="month-row"><button class="month-arrow" onclick="setMonth(pm(cur))">'+IC.chL+'</button>';
  h+='<div class="month-name-wrap" onclick="openMonthPicker()"><span class="month-name">'+ml(cur)+'</span><span class="month-sub">'+(onToday?'This month':'Tap to jump')+' <span class="month-caret">'+IC.caret+'</span></span><input type="month" id="monthPickerInp" class="month-picker-input" value="'+monthPickerVal+'" onchange="setMonthFromPicker(this.value)"></div>';
  h+='<button class="month-arrow" onclick="setMonth(nm(cur))">'+IC.chR+'</button></div>';
  if(!onToday){
    h+='<div style="display:flex;justify-content:center"><button class="month-today-pill" onclick="jumpToToday()">'+IC.target+' Back to '+ml(todayKey)+'</button></div>';
  }
  h+='</div>';

  if(searchOpen){
    h+='<div class="search-row"><input type="text" class="search-input" id="searchInp" placeholder="Search transactions..." value="'+esc(searchQ)+'"></div>';
  }

  h+='<div class="content">';

  const printDate=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  h+='<div class="print-header"><div><div class="print-title">Family Budget — '+ml(cur)+'</div><div class="print-date">Printed '+printDate+'</div></div><div style="text-align:right;font-size:11px;color:#475569">Starting: '+fmtBal(s.start)+'</div></div>';

  // Hero balance card
  const pct=s.total?Math.round(s.confirmed/s.total*100):0;
  const pctCol=pct===100?'#34d399':pct>=50?'#60a5fa':'#fbbf24';
  h+='<div class="hero">';
  h+='<div class="hero-label">Ending Balance · '+ml(cur)+'</div>';
  h+='<div class="hero-balance '+(s.ending<0?'neg':'')+'">'+fmtBal(s.ending)+'</div>';
  h+='<div class="hero-sub"><span class="hero-start-dot"></span>Starts at '+fmtBal(s.start)+'</div>';
  h+='<div class="hero-stats">';
  h+='<div class="hero-stat inc"><div class="hero-stat-label"><span class="hero-stat-arrow">\u25B2</span> Income</div><div class="hero-stat-val">'+fmtBal(s.income)+'</div></div>';
  h+='<div class="hero-stat exp"><div class="hero-stat-label"><span class="hero-stat-arrow">\u25BC</span> Expenses</div><div class="hero-stat-val">'+fmtBal(Math.abs(s.expenses))+'</div></div>';
  h+='</div>';
  if(s.total>0){
    h+='<div class="hero-progress"><div class="hero-progress-top"><span class="hero-progress-label">Confirmed</span><span class="hero-progress-val">'+s.confirmed+' of '+s.total+'</span></div><div class="hero-progress-track"><div class="hero-progress-fill" style="width:'+pct+'%;background:'+pctCol+'"></div></div></div>';
  }
  h+='</div>';

  // Starting balance
  const startCls=isLinked?'linked':(startManual?'manual':'');
  let statusBadge='';
  if(isLinked)statusBadge='<span class="start-status linked">'+IC.link+' Linked</span>';
  else if(startManual)statusBadge='<span class="start-status manual">Manual</span>';
  const linkBtn=startManual?'<button class="link-btn" onclick="relinkBalance()">'+IC.link+' Link</button>':'';
  h+='<div class="start-row '+startCls+'">'+linkBtn+'<span class="start-label">Start:'+statusBadge+'</span><input type="text" class="start-input" inputmode="decimal" value="'+s.start.toFixed(2)+'" onchange="setStartBal(this.value)"></div>';

  // Filter chips
  const counts={
    all:allTxns.length,
    pending:allTxns.filter(t=>!t.confirmed).length,
    confirmed:s.confirmed,
    income:allTxns.filter(t=>eff(t)>0).length,
    expenses:allTxns.filter(t=>eff(t)<0).length,
  };
  h+='<div class="chips-row">';
  ['all','pending','confirmed','income','expenses'].forEach(f=>{
    const lbl=f.charAt(0).toUpperCase()+f.slice(1);
    h+='<button class="chip '+(filter===f?'active':'')+'" onclick="filter=\''+f+'\';render()">'+lbl+'<span class="chip-count">'+counts[f]+'</span></button>';
  });
  h+='</div>';

  // Transactions
  if(displayTxns.length===0){
    if(allTxns.length===0){
      h+='<div class="empty"><div class="empty-icon">\uD83D\uDCB0</div><div class="empty-title">No transactions yet</div><div class="empty-sub">Tap the + button below to add your first one.</div></div>';
    } else {
      h+='<div class="empty"><div class="empty-icon">\uD83D\uDD0D</div><div class="empty-title">Nothing matches</div><div class="empty-sub">Try a different filter or search.</div></div>';
    }
  } else {
    h+='<div class="txn-list">';
    let lastDay=-1;let confirmedHidden=0;
    displayTxns.forEach(t=>{
      if(hideConfirmed&&t.confirmed&&filter!=='confirmed'){confirmedHidden++;return}
      if(t.day!==lastDay){
        if(confirmedHidden>0){
          h+='<div class="hidden-strip" onclick="toggleHideConfirmed()">'+confirmedHidden+' confirmed hidden — tap to show</div>';
          confirmedHidden=0;
        }
        h+='<div class="day-sep"><span class="day-sep-num">Day '+t.day+'</span><span class="day-sep-dow">'+dow(cur,t.day)+'</span><span class="day-sep-line"></span></div>';
        lastDay=t.day;
      }
      const v=eff(t),bal=balMap[t.id],edited=t.confirmed&&t.actual!==null&&t.actual!==undefined;
      const signCls=v>0?'income':v<0?'expense':'zero';
      const balWarn=bal<D.settings.warnRed?'balwarn-red':bal<D.settings.warnOrange?'balwarn-orange':'';
      const cls=['txn-card',signCls,t.confirmed?'confirmed':'',selected.has(t.id)?'sel':'',balWarn].filter(Boolean).join(' ');
      const arrow=v>0?'\u25B2':v<0?'\u25BC':'';
      let amtStr;
      if(edited){amtStr='<span class="txn-edited"><s>'+fmt(t.projected)+'</s>'+fmt(t.actual)+'</span>'}
      else {amtStr='<span class="txn-amt-arrow">'+arrow+'</span>'+fmt(t.projected)}
      const catInitial=(t.category||'?').charAt(0).toUpperCase();

      h+='<div class="'+cls+'" onclick="'+(selMode?'toggleSel(\''+t.id+'\')':'editId=\''+t.id+'\';sheet=\'edit\';render()')+'">';
      if(selMode){
        h+='<input type="checkbox" class="txn-sel" '+(selected.has(t.id)?'checked':'')+' onclick="event.stopPropagation();toggleSel(\''+t.id+'\')">';
      } else {
        h+='<div class="txn-cat-dot" style="background:'+catCol(t.category)+'">'+catInitial+'</div>';
      }
      h+='<div class="txn-body">';
      h+='<div class="txn-top"><span class="txn-desc">'+esc(t.description)+(t.seriesId?'<span class="txn-recur">\u21BB</span>':'')+'</span><span class="txn-amt '+amtCls(v)+'">'+amtStr+'</span></div>';
      h+='<div class="txn-meta">';
      if(t.company)h+='<span class="txn-co">'+esc(t.company)+'</span>';
      h+='<span class="txn-cat-name">'+esc(t.category)+'</span>';
      h+='<span class="txn-bal">bal '+fmtBal(bal)+'</span></div>';
      if(t.note)h+='<div class="txn-note">'+esc(t.note.split('\n')[0].substring(0,60))+'</div>';
      h+='</div>';
      if(!selMode){
        const checkAction=t.confirmed?'unconfirmTxn(\''+t.id+'\')':'confId=\''+t.id+'\';confEditing=false;sheet=\'confirm\';render()';
        h+='<div class="txn-check '+(t.confirmed?'on':'')+'" onclick="event.stopPropagation();'+checkAction+'">'+(t.confirmed?IC.check:'')+'</div>';
      }
      h+='</div>';
    });
    if(confirmedHidden>0){
      h+='<div class="hidden-strip" onclick="toggleHideConfirmed()">'+confirmedHidden+' confirmed hidden — tap to show</div>';
    }
    h+='</div>';
  }

  h+='<div class="ts-row"><span>Updated '+fmtTs(D.lastUpdated)+'</span><span><span class="ts-dot '+bkCls(D.lastBackup)+'"></span>Backup '+fmtTs(D.lastBackup)+'</span></div>';

  h+='</div>';

  if(selMode&&selected.size>0){
    h+='<div class="bulk-bar"><span class="bulk-count">'+selected.size+' selected</span><div class="bulk-btns"><button class="bulk-btn" onclick="bulkCopy()">Copy</button><button class="bulk-btn danger" onclick="bulkDelete()">Delete</button><button class="bulk-btn" onclick="selected.clear();selMode=false;render()">Done</button></div></div>';
  }

  // Bottom nav
  h+='<div class="bnav">';
  h+='<button class="bnav-btn" onclick="sheet=\'pull\';render()"><div class="bnav-icon">'+IC.pull+'</div>Pull</button>';
  h+='<button class="bnav-btn" onclick="createNewMonth()"><div class="bnav-icon">'+IC.cal+'</div>New Month</button>';
  h+='<button class="bnav-btn bnav-add primary" onclick="openAddSheet()"><div class="bnav-icon">'+IC.plus+'</div>Add</button>';
  h+='<button class="bnav-btn" onclick="sheet=\'menu\';render()"><div class="bnav-icon">'+IC.menu+'</div>More</button>';
  h+='</div>';

  h+=renderSheets();

  document.getElementById('app').innerHTML=h;

  setTimeout(()=>{
    if(searchOpen){
      const si=document.getElementById('searchInp');
      if(si){si.focus();si.addEventListener('input',e=>{searchQ=e.target.value;render()})}
    }
    document.getElementById('aDesc')?.focus();
    document.getElementById('confInp')?.focus();
    if(sheet==='pull')renderPull();
  },50);
}

function renderSheets(){
  if(sheet==='add')return renderAddSheet();
  if(sheet==='edit'&&editId)return renderEditSheet();
  if(sheet==='confirm'&&confId)return renderConfirmSheet();
  if(sheet==='pull')return renderPullSheet();
  if(sheet==='menu')return renderMenuSheet();
  if(sheet==='settings')return renderSettingsSheet();
  if(sheet==='series-edit'&&seriesActionId)return renderSeriesEditSheet();
  if(sheet==='series-delete'&&seriesActionId)return renderSeriesDeleteSheet();
  return '';
}

function openAddSheet(){
  addState={sign:-1};
  recurState={enabled:false,advanced:false,freq:'Monthly',endType:'eoy',endDate:'',endCount:12,endMonths:6};
  sheet='add';render();
}

      }
      if(recurState.endType==='date'){
        h+='<div class="fg" style="margin-top:10px;margin-bottom:0"><label class="fg-label">End date</label><input type="date" class="fg-input" value="'+recurState.endDate+'" onchange="recurState.endDate=this.value"></div>';
      }
      if(recurState.endType==='count'){
        h+='<div class="fg" style="margin-top:10px;margin-bottom:0"><label class="fg-label">Number of occurrences</label><input type="number" class="fg-input" min="1" max="200" value="'+recurState.endCount+'" onchange="recurState.endCount=parseInt(this.value)||12" inputmode="numeric"></div>';
      }
    }
    h+='<button type="button" class="recur-adv-toggle" onclick="toggleRecurAdvanced()">'+(recurState.advanced?'\u25B2 Hide advanced options':'\u25BE Advanced options')+'</button>';
    h+='<div class="recur-warn">Creates transactions in future months. New future months auto-link their starting balance to the previous month.</div>';
  }
  h+='</div>';

  h+='<div style="height:14px"></div><button class="btn-full primary" onclick="submitAdd()">'+IC.plus+' Add Transaction</button>';
  h+='</div></div></div>';
  return h;
}

function submitAdd(){
  const day=Math.max(1,Math.min(31,parseInt(document.getElementById('aDay').value)||1));
  const desc=document.getElementById('aDesc').value.trim();
  const co=document.getElementById('aCo').value.trim();
  const cat=document.getElementById('aCat').value;
  const type=document.getElementById('aType').value;
  const freq=document.getElementById('aFreq').value;
  const amtRaw=parseFloat(document.getElementById('aAmt').value);
  const note=document.getElementById('aNote').value.trim();
  if(!desc){alert('Description required.');return}
  if(isNaN(amtRaw)||amtRaw<0){alert('Amount required (positive number).');return}
  const amt=amtRaw*readAddSign();
  if(recurState.enabled&&recurState.advanced&&recurState.endType==='date'&&!recurState.endDate){alert('End date required.');return}
  addTxn({day:day,description:desc,company:co,category:cat,type:type,frequency:freq,projected:amt,note:note},recurState.enabled?Object.assign({},recurState):null);
}

function renderEditSheet(){
  const t=getM().transactions.find(t=>t.id===editId);if(!t)return'';
  const sorted=sortTxns(getM().transactions);
  const idx=sorted.findIndex(x=>x.id===editId);
  const cUp=idx>0&&sorted[idx-1].day===t.day;
  const cDn=idx<sorted.length-1&&sorted[idx+1].day===t.day;
  if(editState._id!==t.id){editState={sign:t.projected>=0?1:-1,_id:t.id}}
  const isRecurring=!!t.seriesId;
  let h='<div class="sheet-bg" onclick="sheet=null;editId=null;editState={sign:-1,_id:null};render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Edit Transaction'+(isRecurring?' <span style="font-size:.75rem;font-weight:500;color:var(--text2);margin-left:6px">(recurring \u21BB)</span>':'')+'</span><button class="sheet-close" onclick="sheet=null;editId=null;editState={sign:-1,_id:null};render()">'+IC.x+'</button></div><div class="sheet-body">';
  h+='<div class="fg-row"><div class="fg" style="flex:0 0 70px"><label class="fg-label">Day</label><input type="number" class="fg-input" id="eDay" value="'+t.day+'" min="1" max="31" inputmode="numeric"></div><div class="fg"><label class="fg-label">Description</label><input class="fg-input" id="eDesc" value="'+esc(t.description)+'"></div></div>';
  h+='<div class="fg"><label class="fg-label">Company</label><input class="fg-input" id="eCo" value="'+esc(t.company||'')+'"></div>';
  h+='<div class="fg-row"><div class="fg"><label class="fg-label">Category</label><select class="fg-select" id="eCat" onchange="onEditCatChange(this.value)">'+catOpts(t.category)+'</select></div><div class="fg"><label class="fg-label">Type</label><select class="fg-select" id="eType">'+typeOpts(t.type)+'</select></div></div>';
  h+='<div class="fg"><label class="fg-label">Frequency</label><select class="fg-select" id="eFreq">'+freqOpts(t.frequency)+'</select></div>';
  h+='<div class="fg"><label class="fg-label">Amount</label>';
  h+='<div class="sign-toggle">';
  h+='<button type="button" id="editSignExpense" class="sign-btn expense '+(editState.sign===-1?'active':'')+'" onclick="setEditSign(-1)">\u25BC Expense</button>';
  h+='<button type="button" id="editSignIncome" class="sign-btn income '+(editState.sign===1?'active':'')+'" onclick="setEditSign(1)">\u25B2 Income</button>';
  h+='</div>';
  h+='<div class="amt-input-wrap"><span class="amt-input-prefix">$</span><input type="number" step="0.01" min="0" class="fg-input" id="eAmt" value="'+Math.abs(t.projected)+'" inputmode="decimal"></div>';
  h+='</div>';
  h+='<div class="fg"><label class="fg-label">Note</label><textarea class="fg-textarea" id="eNote" rows="2">'+esc(t.note||'')+'</textarea></div>';
  h+='<div style="font-size:.85rem;color:'+(t.confirmed?'var(--green)':'#ca8a04')+';margin-bottom:14px;font-weight:500">'+(t.confirmed?'\u2713 Confirmed'+(t.actual!==null&&t.actual!==undefined?' \u2014 actual: '+fmt(t.actual):''):'\u23F3 Pending')+'</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px">';
  h+='<button class="btn-full secondary" style="flex:0 0 auto;padding:10px" onclick="moveUp(\''+t.id+'\');editId=\''+t.id+'\';render()" '+(cUp?'':'disabled')+'>'+IC.up+'</button>';
  h+='<button class="btn-full secondary" style="flex:0 0 auto;padding:10px" onclick="moveDown(\''+t.id+'\');editId=\''+t.id+'\';render()" '+(cDn?'':'disabled')+'>'+IC.dn+'</button>';
  h+='<button class="btn-full secondary" style="flex:1" onclick="cloneTxn(\''+t.id+'\')">'+IC.copy+' Clone</button>';
  h+='</div>';
  h+='<button class="btn-full primary" onclick="submitEdit(\''+t.id+'\','+isRecurring+')">Save Changes</button>';
  h+='<div style="height:8px"></div>';
  if(isRecurring){
    h+='<button class="btn-full danger" onclick="seriesActionId=\''+t.id+'\';sheet=\'series-delete\';render()">'+IC.trash+' Delete Recurring...</button>';
  } else {
    h+='<button class="btn-full danger" onclick="if(confirm(\'Delete?\'))deleteTxn(\''+t.id+'\')">'+IC.trash+' Delete Transaction</button>';
  }
  h+='</div></div></div>';
  return h;
}

function submitEdit(id,isRecurring){
  const day=Math.max(1,Math.min(31,parseInt(document.getElementById('eDay').value)||1));
  const desc=document.getElementById('eDesc').value.trim();
  const co=document.getElementById('eCo').value.trim();
  const cat=document.getElementById('eCat').value;
  const type=document.getElementById('eType').value;
  const freq=document.getElementById('eFreq').value;
  const amtRaw=parseFloat(document.getElementById('eAmt').value);
  const note=document.getElementById('eNote').value.trim();
  if(!desc){alert('Description required.');return}
  if(isNaN(amtRaw)||amtRaw<0){alert('Amount required (positive number).');return}
  const amt=amtRaw*readEditSign();
  const updates={day:day,description:desc,company:co,category:cat,type:type,frequency:freq,projected:amt,note:note};
  if(isRecurring){
    seriesActionId=id;seriesAction={type:'edit',updates:updates};sheet='series-edit';render();
    return;
  }
  updateTxn(id,updates);
  sheet=null;editId=null;editState={sign:-1,_id:null};
  toast('Updated');
}

function renderSeriesEditSheet(){
  const id=seriesActionId;
  let h='<div class="sheet-bg" onclick="sheet=null;seriesActionId=null;seriesAction=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Apply changes to...</span><button class="sheet-close" onclick="sheet=null;seriesActionId=null;seriesAction=null;render()">'+IC.x+'</button></div><div class="sheet-body">';
  h+='<button class="choice-btn" onclick="updateTxn(\''+id+'\',seriesAction.updates);sheet=null;editId=null;editState={sign:-1,_id:null};seriesActionId=null;seriesAction=null;toast(\'Updated\')"><div class="choice-btn-title">This occurrence only</div><div class="choice-btn-sub">Other occurrences stay unchanged</div></button>';
  h+='<button class="choice-btn" onclick="updateSeriesFromHere(\''+id+'\',seriesAction.updates);editId=null;editState={sign:-1,_id:null};seriesActionId=null;seriesAction=null"><div class="choice-btn-title">This and future occurrences</div><div class="choice-btn-sub">Past occurrences stay unchanged</div></button>';

}

function renderSeriesDeleteSheet(){
  const id=seriesActionId;
  let h='<div class="sheet-bg" onclick="sheet=null;seriesActionId=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Delete...</span><button class="sheet-close" onclick="sheet=null;seriesActionId=null;render()">'+IC.x+'</button></div><div class="sheet-body">';

  h+='<button class="choice-btn" onclick="const t=getM().transactions.find(x=>x.id===\''+id+'\');if(t&&t.seriesId)deleteSeriesAll(t.seriesId);seriesActionId=null"><div class="choice-btn-title" style="color:var(--red)">Entire series</div><div class="choice-btn-sub">All occurrences past, present, and future</div></button>';
  h+='<button class="btn-full secondary" style="margin-top:10px" onclick="sheet=null;seriesActionId=null;render()">Cancel</button>';
  h+='</div></div></div>';
  return h;
}

function renderConfirmSheet(){
  const t=getM().transactions.find(t=>t.id===confId);if(!t)return'';
  let h='<div class="sheet-bg" onclick="sheet=null;confId=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Confirm Transaction</span><button class="sheet-close" onclick="sheet=null;confId=null;render()">'+IC.x+'</button></div><div class="sheet-body">';
  h+='<div class="conf-desc">'+esc(t.description)+'</div>';
  if(!confEditing){
    h+='<div class="conf-amount" style="color:'+(t.projected>0?'var(--green)':'var(--red)')+'">'+fmt(t.projected)+'</div>';
    h+='<div class="conf-q">Is this amount correct?</div>';
    h+='<div style="display:flex;gap:10px">';
    h+='<button class="btn-full primary" onclick="confirmTxn(\''+t.id+'\','+t.projected+')">Confirm</button>';
    h+='<button class="btn-full secondary" onclick="confEditing=true;render()">Edit Amount</button>';
    h+='</div>';
  } else {
    h+='<div class="conf-q">Enter the actual amount<br><span style="font-size:.75rem;color:var(--text3)">(use negative for expenses)</span></div>';
    h+='<input type="number" step="0.01" class="conf-edit-input" id="confInp" value="'+t.projected+'" inputmode="decimal">';
    h+='<div style="display:flex;gap:10px">';
    h+='<button class="btn-full primary" onclick="const v=parseFloat(document.getElementById(\'confInp\').value);if(!isNaN(v))confirmTxn(\''+t.id+'\',v)">Save</button>';
    h+='<button class="btn-full secondary" onclick="sheet=null;confId=null;render()">Cancel</button>';
    h+='</div>';
  }
  h+='</div></div></div>';
  return h;
}

function renderPullSheet(){
  const other=allKeys().filter(k=>k!==cur);
  const defSrc=other.length?other[other.length-1]:'';
  let h='<div class="sheet-bg" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Pull Transactions</span><button class="sheet-close" onclick="sheet=null;render()">'+IC.x+'</button></div><div class="sheet-body">';
  if(!other.length){
    h+='<div class="empty">No other months.</div>';
  } else {
    h+='<div class="fg"><label class="fg-label">From</label><select class="fg-select" id="pSrc" onchange="renderPull()">';
    other.forEach(k=>{h+='<option value="'+k+'"'+(k===defSrc?' selected':'')+'>'+ml(k)+'</option>'});
    h+='</select></div>';
    h+='<div class="pull-info" id="pInfo">Select transactions below</div>';
    h+='<div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn-full secondary" style="font-size:.85rem;padding:8px" onclick="togglePullAll()">Select All</button></div>';
    h+='<div id="pList" style="max-height:300px;overflow-y:auto"></div>';
    h+='<div style="height:12px"></div>';
    h+='<button class="btn-full primary" onclick="submitPull()">'+IC.pull+' Pull Selected</button>';
  }
  h+='</div></div></div>';
  return h;
}

function renderSettingsSheet(){
  let h='<div class="sheet-bg" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Settings</span><button class="sheet-close" onclick="sheet=null;render()">'+IC.x+'</button></div><div class="sheet-body">';
  // Categories
  h+='<div class="set-section-title">Categories</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px"><input class="fg-input" id="newCatN" placeholder="New category..." style="flex:1"><input type="color" id="newCatC" value="#64748b" class="set-color-inp"><button class="btn-full primary" style="flex:0 0 auto;width:auto;padding:10px 16px" onclick="addCat()">Add</button></div>';
  h+=D.categories.map(function(c){var cnt=0;Object.values(D.months).forEach(function(m){cnt+=m.transactions.filter(function(t){return t.category===c.name}).length});return '<div class="set-item"><div class="set-color-dot" style="background:'+c.color+'" onclick="editCatColor(\''+esc(c.name)+'\')"></div><div class="set-item-name">'+esc(c.name)+'</div><div class="set-item-count">'+cnt+'</div><button class="set-item-btn" onclick="editCatName(\''+esc(c.name)+'\')">'+IC.edit+'</button><button class="set-item-btn del" onclick="delCat(\''+esc(c.name)+'\')">'+IC.trash+'</button></div>'}).join('');
  // Types
  h+='<div class="set-section-title">Payment Types</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px"><input class="fg-input" id="newTypeN" placeholder="New payment type..." style="flex:1"><button class="btn-full primary" style="flex:0 0 auto;width:auto;padding:10px 16px" onclick="addListItem(\'types\',\'newTypeN\')">Add</button></div>';
  h+=D.settings.types.map(function(v){return '<div class="set-item"><div class="set-item-name">'+esc(v)+'</div><div class="set-item-count">'+countUse('type',v)+'</div><button class="set-item-btn" onclick="renameListItem(\'types\',\'type\',\''+esc(v)+'\')">'+IC.edit+'</button><button class="set-item-btn del" onclick="delListItem(\'types\',\'type\',\''+esc(v)+'\')">'+IC.trash+'</button></div>'}).join('');
  // Frequencies
  h+='<div class="set-section-title">Frequencies</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px"><input class="fg-input" id="newFreqN" placeholder="New frequency..." style="flex:1"><button class="btn-full primary" style="flex:0 0 auto;width:auto;padding:10px 16px" onclick="addListItem(\'frequencies\',\'newFreqN\')">Add</button></div>';
  h+=D.settings.frequencies.map(function(v){return '<div class="set-item"><div class="set-item-name">'+esc(v)+'</div><div class="set-item-count">'+countUse('frequency',v)+'</div><button class="set-item-btn" onclick="renameListItem(\'frequencies\',\'frequency\',\''+esc(v)+'\')">'+IC.edit+'</button><button class="set-item-btn del" onclick="delListItem(\'frequencies\',\'frequency\',\''+esc(v)+'\')">'+IC.trash+'</button></div>'}).join('');
  h+='<div class="set-note">The Frequency field is informational. Recurring-schedule options are fixed because they drive date generation.</div>';
  // Alerts
  h+='<div class="set-section-title">Balance Alerts</div>';
  h+='<div class="set-note" style="margin-top:0;margin-bottom:10px">Cards fade to a warning color when the running balance drops below these amounts.</div>';
  h+='<div class="fg-row"><div class="fg"><label class="fg-label">Orange below ($)</label><input type="number" step="50" min="0" inputmode="decimal" class="fg-input" value="'+D.settings.warnOrange+'" onchange="setWarn(\'warnOrange\',this.value)"></div><div class="fg"><label class="fg-label">Red below ($)</label><input type="number" step="50" min="0" inputmode="decimal" class="fg-input" value="'+D.settings.warnRed+'" onchange="setWarn(\'warnRed\',this.value)"></div></div>';
  h+='<div style="border-radius:10px;overflow:hidden;border:1px solid var(--line)"><div style="padding:10px 12px;font-size:.8rem;background:linear-gradient(to right,#fff 0%,#fff 40%,#fed7aa 100%)">Balance below '+fmtBal(D.settings.warnOrange)+'</div><div style="padding:10px 12px;font-size:.8rem;background:linear-gradient(to right,#fff 0%,#fff 35%,#fecaca 100%)">Balance below '+fmtBal(D.settings.warnRed)+'</div></div>';
  if(D.settings.warnRed>D.settings.warnOrange)h+='<div class="set-note" style="color:var(--red)">Heads up: the red threshold is above the orange one, so orange will never show.</div>';
  h+='</div></div></div>';
  return h;
}

function renderMenuSheet(){
  let h='<div class="sheet-bg" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Options</span><button class="sheet-close" onclick="sheet=null;render()">'+IC.x+'</button></div><div class="sheet-body">';
  h+='<div class="menu-item" onclick="sheet=\'settings\';render()"><span class="menu-icon">'+IC.gear+'</span>Settings</div>';
  h+='<div class="menu-item toggle-item" onclick="toggleHideConfirmed()"><span style="display:flex;align-items:center;gap:12px"><span class="menu-icon">'+(D.settings.hideConfirmed?IC.eyeOff:IC.eye)+'</span>Hide confirmed transactions</span><div class="recur-switch '+(D.settings.hideConfirmed?'on':'')+'"></div></div>';
  h+='<div class="menu-item" onclick="printReport()"><span class="menu-icon">'+IC.print+'</span>Print Report</div>';
  h+='<div class="menu-item" onclick="exportData()"><span class="menu-icon">'+IC.dl+'</span>Export Data</div>';
  h+='<div class="menu-item" onclick="document.getElementById(\'imp2\').click()"><span class="menu-icon">'+IC.ul+'</span>Import Data<input type="file" id="imp2" accept=".json" style="display:none" onchange="importData(this.files[0])"></div>';
  h+='<div class="menu-item" onclick="createNewMonth();sheet=null"><span class="menu-icon">'+IC.cal+'</span>Create New Month</div>';
  h+='<div class="menu-item danger" onclick="deleteMonth()"><span class="menu-icon">'+IC.trash+'</span>Delete This Month</div>';
  h+='</div></div></div>';

}

function renderPull(){
  const src=document.getElementById('pSrc')?.value;
  const el=document.getElementById('pList');
  if(!src||!el||!D.months[src])return;
  const txns=sortTxns(D.months[src].transactions);
  el.innerHTML=txns.map(t=>'<div class="pull-item" onclick="this.querySelector(\'input\').checked=!this.querySelector(\'input\').checked;updatePI()"><input type="checkbox" class="pull-cb" value="'+t.id+'" onclick="event.stopPropagation();updatePI()"><span class="pull-desc">'+esc(t.description)+'</span><span class="pull-amt" style="color:'+(t.projected>0?'var(--green)':'var(--text)')+'">'+fmt(t.projected)+'</span></div>').join('');
  updatePI();
}
function updatePI(){const cbs=document.querySelectorAll('.pull-cb:checked'),el=document.getElementById('pInfo');if(!el)return;if(!cbs.length){el.innerHTML='Select transactions below';return}let total=0;const src=document.getElementById('pSrc')?.value;cbs.forEach(cb=>{if(src&&D.months[src]){const t=D.months[src].transactions.find(t=>t.id===cb.value);if(t)total+=t.projected}});el.innerHTML='<strong>'+cbs.length+' selected</strong> \u00B7 Net: '+fmt(total)}
function togglePullAll(){const cbs=document.querySelectorAll('.pull-cb'),all=Array.from(cbs).every(cb=>cb.checked);cbs.forEach(cb=>cb.checked=!all);updatePI()}
function submitPull(){const src=document.getElementById('pSrc')?.value;if(!src)return;const ids=Array.from(document.querySelectorAll('.pull-cb:checked')).map(cb=>cb.value);if(!ids.length){alert('Select at least one.');return}pullTxns(src,ids)}

load();render();
</script>
